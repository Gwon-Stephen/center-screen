name: Release

# Triggers when you push a tag like v1.0.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build & publish macOS app
    runs-on: macos-15   # Xcode 16 / Swift 6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build release binary
        run: swift build -c release

      - name: Package .app bundle
        run: |
          APP=CenterScreen.app
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp .build/release/CenterScreen "$APP/Contents/MacOS/CenterScreen"
          cp Info.plist "$APP/Contents/Info.plist"
          if [ -f Resources/AppIcon.icns ]; then
            cp Resources/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          fi

          # Zip the .app so GitHub can attach it as a release asset
          ditto -c -k --keepParent "$APP" CenterScreen.zip

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          name: "CenterScreen ${{ github.ref_name }}"
          body: |
            ## Installation

            > **macOS 13 Ventura or later required.**

            1. Download **CenterScreen.zip** below and unzip it.
            2. Move **CenterScreen.app** to your `Applications` folder.
            3. **Right-click → Open** the first time (bypasses Gatekeeper since the app is unsigned).
            4. Grant **Accessibility permission** when prompted (System Settings → Privacy & Security → Accessibility). This lets the app update hover states after moving your cursor.
            5. *(Optional)* Add CenterScreen to **System Settings → General → Login Items** so it starts automatically.

            ## Default shortcuts

            | Action | Shortcut |
            |---|---|
            | Center on current screen | ⌃⇧⌘C |
            | Next screen → | ⌃⇧⌘→ |
            | Previous screen ← | ⌃⇧⌘← |
            | Jump to screen 1 / 2 / 3 | ⌃⇧⌘1 / 2 / 3 |

            All shortcuts are customisable via the menu bar icon → **Settings…**
          files: CenterScreen.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
